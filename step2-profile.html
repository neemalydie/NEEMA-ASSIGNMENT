<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMARA - Step 2: Profile & Location</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .form-container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .form-header {
            background: #0f3b2c;
            padding: 1.5rem 2rem;
            color: white;
        }

        .form-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .welcome-message {
            background: #fef9e6;
            padding: 0.75rem 2rem;
            font-size: 0.9rem;
            color: #0f3b2c;
            border-bottom: 1px solid #e2e8f0;
        }

        .progress-steps {
            display: flex;
            padding: 1.2rem 2rem;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            gap: 1rem;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .step-number {
            width: 28px;
            height: 28px;
            background: #cbd5e1;
            color: #1e293b;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .step.completed .step-number {
            background: #10b981;
            color: white;
        }

        .step.completed .step-number::after {
            content: "✓";
        }

        .step.active .step-number {
            background: #0f3b2c;
            color: white;
        }

        .form-body {
            padding: 2rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0f3b2c;
            margin: 1.5rem 0 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e2e8f0;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        input, select {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            background-color: #ffffff !important;
            color: #1e293b !important;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0f3b2c;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }

        .required:after {
            content: " *";
            color: #dc2626;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .gender-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .gender-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .gender-option input {
            width: 18px;
            height: 18px;
        }

        .error-message {
            color: #dc2626;
            font-size: 0.75rem;
            margin-top: 0.4rem;
        }

        .input-error {
            border-color: #dc2626 !important;
        }

        .input-success {
            border-color: #10b981 !important;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-back, .btn-complete {
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 3rem;
            cursor: pointer;
            border: none;
        }

        .btn-back {
            background: #e2e8f0;
            color: #1e293b;
            flex: 1;
        }

        .btn-back:hover {
            background: #cbd5e1;
        }

        .btn-complete {
            background: #0f3b2c;
            color: white;
            flex: 2;
        }

        .btn-complete:hover {
            background: #1e4a3b;
        }

        .login-link {
            text-align: center;
            margin-top: 1.8rem;
            color: #334155;
        }

        .login-link a {
            color: #0f3b2c;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 560px) {
            .form-body { padding: 1.5rem; }
            .row-2col { grid-template-columns: 1fr; gap: 0; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <h1>IMARA</h1>
        <p>RGMA LINEAGE</p>
    </div>

    <div class="welcome-message" id="welcomeMsg">
        Loading your information...
    </div>

    <div class="progress-steps">
        <div class="step completed"><span class="step-number">✓</span><span>1 Basic Info</span></div>
        <div class="step active"><span class="step-number">2</span><span>Profile</span></div>
        <div class="step"><span class="step-number">3</span><span>Complete</span></div>
    </div>

    <div class="form-body">
        <div class="section-title">📋 Profile & Location</div>

        <div class="form-group">
            <label class="required">Gender</label>
            <div class="gender-group">
                <div class="gender-option"><input type="radio" name="gender" value="Male" id="male"><label for="male">👨 Male</label></div>
                <div class="gender-option"><input type="radio" name="gender" value="Female" id="female"><label for="female">👩 Female</label></div>
                <div class="gender-option"><input type="radio" name="gender" value="Other" id="other"><label for="other">🌈 Other</label></div>
            </div>
            <div class="error-message" id="genderError"></div>
        </div>

        <div class="section-title">📍 Address Information</div>

        <div class="row-2col">
            <div class="form-group">
                <label class="required">Province</label>
                <select id="province">
                    <option value="">Select Province</option>
                    <option value="Kigali City">Kigali City</option>
                    <option value="Northern Province">Northern Province</option>
                    <option value="Southern Province">Southern Province</option>
                    <option value="Eastern Province">Eastern Province</option>
                    <option value="Western Province">Western Province</option>
                </select>
                <div class="error-message" id="provinceError"></div>
            </div>

            <div class="form-group">
                <label class="required">District</label>
                <select id="district">
                    <option value="">Select Province first</option>
                </select>
                <div class="error-message" id="districtError"></div>
            </div>
        </div>

        <div class="row-2col">
            <div class="form-group">
                <label class="required">Sector</label>
                <input type="text" id="sector" placeholder="e.g., Kimihurura">
                <div class="error-message" id="sectorError"></div>
            </div>

            <div class="form-group">
                <label class="required">Cell</label>
                <input type="text" id="cell" placeholder="e.g., Ubumwe">
                <div class="error-message" id="cellError"></div>
            </div>
        </div>

        <div class="form-group">
            <label class="required">Village</label>
            <input type="text" id="village" placeholder="e.g., Amahoro Village">
            <div class="error-message" id="villageError"></div>
        </div>

        <div class="button-group">
            <button type="button" class="btn-back" id="backBtn">← Back</button>
            <button type="button" class="btn-complete" id="completeProfileBtn">Complete registration →</button>
        </div>

        <div class="login-link">Already have an account? <a href="#">Login here</a></div>
    </div>
</div>

<script>
    const districtsByProvince = {
        'Kigali City': ['Nyarugenge', 'Gasabo', 'Kicukiro'],
        'Northern Province': ['Musanze', 'Burera', 'Gakenke', 'Gicumbi', 'Rulindo'],
        'Southern Province': ['Nyanza', 'Gisagara', 'Huye', 'Kamonyi', 'Muhanga', 'Nyamagabe', 'Nyaruguru', 'Ruhango'],
        'Eastern Province': ['Bugesera', 'Gatsibo', 'Kayonza', 'Kirehe', 'Ngoma', 'Nyagatare', 'Rwamagana'],
        'Western Province': ['Karongi', 'Ngororero', 'Nyabihu', 'Nyamasheke', 'Rubavu', 'Rusizi', 'Rutsiro']
    };

    let step1Data = {};

    window.addEventListener('DOMContentLoaded', function() {
        const savedData = localStorage.getItem('imara_signup_data');
        
        if (savedData) {
            step1Data = JSON.parse(savedData);
            document.getElementById('welcomeMsg').innerHTML = `👋 Welcome back, <strong>${step1Data.fullName || 'User'}</strong>! Please complete your profile.`;
        } else {
            document.getElementById('welcomeMsg').innerHTML = `⚠️ No previous data found. Please start from <a href="step1-basic-info.html">Step 1</a>.`;
        }
        
        updateDistricts();
    });

    function updateDistricts() {
        const selectedProvince = document.getElementById('province').value;
        const districtSelect = document.getElementById('district');
        
        districtSelect.innerHTML = '<option value="">Select District</option>';
        
        if (selectedProvince && districtsByProvince[selectedProvince]) {
            districtsByProvince[selectedProvince].forEach(district => {
                const option = document.createElement('option');
                option.value = district;
                option.textContent = district;
                districtSelect.appendChild(option);
            });
            districtSelect.disabled = false;
        } else {
            districtSelect.disabled = true;
        }
    }

    document.getElementById('province').addEventListener('change', updateDistricts);

    function validateGender() {
        const selected = document.querySelector('input[name="gender"]:checked');
        if (!selected) {
            document.getElementById('genderError').innerText = 'Please select your gender';
            return false;
        }
        document.getElementById('genderError').innerText = '';
        return true;
    }

    function validateProvince() {
        const value = document.getElementById('province').value;
        if (!value) {
            document.getElementById('provinceError').innerText = 'Please select a province';
            document.getElementById('province').classList.add('input-error');
            return false;
        }
        document.getElementById('provinceError').innerText = '';
        document.getElementById('province').classList.remove('input-error');
        document.getElementById('province').classList.add('input-success');
        return true;
    }

    function validateDistrict() {
        const value = document.getElementById('district').value;
        if (!value) {
            document.getElementById('districtError').innerText = 'Please select a district';
            document.getElementById('district').classList.add('input-error');
            return false;
        }
        document.getElementById('districtError').innerText = '';
        document.getElementById('district').classList.remove('input-error');
        document.getElementById('district').classList.add('input-success');
        return true;
    }

    function validateSector() {
        const value = document.getElementById('sector').value.trim();
        if (!value) {
            document.getElementById('sectorError').innerText = 'Sector is required';
            document.getElementById('sector').classList.add('input-error');
            return false;
        }
        document.getElementById('sectorError').innerText = '';
        document.getElementById('sector').classList.remove('input-error');
        document.getElementById('sector').classList.add('input-success');
        return true;
    }

    function validateCell() {
        const value = document.getElementById('cell').value.trim();
        if (!value) {
            document.getElementById('cellError').innerText = 'Cell is required';
            document.getElementById('cell').classList.add('input-error');
            return false;
        }
        document.getElementById('cellError').innerText = '';
        document.getElementById('cell').classList.remove('input-error');
        document.getElementById('cell').classList.add('input-success');
        return true;
    }

    function validateVillage() {
        const value = document.getElementById('village').value.trim();
        if (!value) {
            document.getElementById('villageError').innerText = 'Village is required';
            document.getElementById('village').classList.add('input-error');
            return false;
        }
        document.getElementById('villageError').innerText = '';
        document.getElementById('village').classList.remove('input-error');
        document.getElementById('village').classList.add('input-success');
        return true;
    }

    document.getElementById('completeProfileBtn').addEventListener('click', function() {
        const isGenderValid = validateGender();
        const isProvinceValid = validateProvince();
        const isDistrictValid = validateDistrict();
        const isSectorValid = validateSector();
        const isCellValid = validateCell();
        const isVillageValid = validateVillage();
        
        if (isGenderValid && isProvinceValid && isDistrictValid && isSectorValid && isCellValid && isVillageValid) {
            const selectedGender = document.querySelector('input[name="gender"]:checked').value;
            
            const completeUserData = {
                ...step1Data,
                gender: selectedGender,
                province: document.getElementById('province').value,
                district: document.getElementById('district').value,
                sector: document.getElementById('sector').value.trim(),
                cell: document.getElementById('cell').value.trim(),
                village: document.getElementById('village').value.trim(),
                registrationStep: 2
            };
            
            localStorage.setItem('imara_signup_data', JSON.stringify(completeUserData));
            
            alert('✓ Profile saved! Redirecting to completion page...');
            window.location.href = 'step3-complete.html';
        } else {
            alert('❌ Please fill all required fields before continuing.');
        }
    });
    
    document.getElementById('backBtn').addEventListener('click', function() {
        window.location.href = 'step1-basic-info.html';
    });
</script>
</body>
</html>
